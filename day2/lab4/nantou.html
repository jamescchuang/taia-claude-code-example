<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南投市即時天氣</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #74b9ff 0%, #0984e3 50%, #2d3436 100%);
    padding: 20px;
    color: #fff;
  }
  .card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
  }
  h1 { font-size: 1.8rem; margin-bottom: 4px; font-weight: 600; }
  .sub { font-size: 0.95rem; opacity: 0.8; margin-bottom: 28px; }
  .icon { font-size: 5rem; margin: 8px 0; }
  .temp { font-size: 4.5rem; font-weight: 200; line-height: 1; }
  .temp .unit { font-size: 2rem; vertical-align: super; opacity: 0.8; }
  .desc { font-size: 1.2rem; margin-top: 6px; margin-bottom: 24px; opacity: 0.95; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  .item {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 14px 8px;
  }
  .item .label { font-size: 0.78rem; opacity: 0.75; margin-bottom: 4px; }
  .item .value { font-size: 1.05rem; font-weight: 500; }
  .footer { margin-top: 24px; font-size: 0.75rem; opacity: 0.65; }
  .loading, .error { padding: 20px; }
  .error { color: #ffe0e0; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="loading">載入中…</div>
  </div>

<script>
const LAT = 23.9157, LON = 120.6869;
const WMO = {
  0:  ["晴朗", "☀️"],
  1:  ["大致晴朗", "🌤️"],
  2:  ["局部多雲", "⛅"],
  3:  ["陰天", "☁️"],
  45: ["有霧", "🌫️"],
  48: ["凍霧", "🌫️"],
  51: ["毛毛雨", "🌦️"],
  53: ["毛毛雨", "🌦️"],
  55: ["大毛毛雨", "🌦️"],
  61: ["小雨", "🌧️"],
  63: ["中雨", "🌧️"],
  65: ["大雨", "🌧️"],
  71: ["小雪", "🌨️"],
  73: ["中雪", "🌨️"],
  75: ["大雪", "❄️"],
  80: ["陣雨", "🌦️"],
  81: ["強陣雨", "🌧️"],
  82: ["豪雨", "⛈️"],
  95: ["雷雨", "⛈️"],
  96: ["雷雨夾冰雹", "⛈️"],
  99: ["強雷雨", "⛈️"]
};

async function load() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
            + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m`
            + `&timezone=Asia%2FTaipei`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const c = data.current;
    const [desc, icon] = WMO[c.weather_code] || ["—", "🌡️"];
    const time = new Date(c.time).toLocaleString("zh-TW", { hour: "2-digit", minute: "2-digit", month: "long", day: "numeric" });

    document.getElementById("card").innerHTML = `
      <h1>南投市</h1>
      <div class="sub">Nantou City · ${time}</div>
      <div class="icon">${icon}</div>
      <div class="temp">${Math.round(c.temperature_2m)}<span class="unit">°C</span></div>
      <div class="desc">${desc}</div>
      <div class="grid">
        <div class="item"><div class="label">體感溫度</div><div class="value">${Math.round(c.apparent_temperature)}°C</div></div>
        <div class="item"><div class="label">相對濕度</div><div class="value">${c.relative_humidity_2m}%</div></div>
        <div class="item"><div class="label">風速</div><div class="value">${c.wind_speed_10m} km/h</div></div>
      </div>
      <div class="footer">資料來源：Open-Meteo</div>
    `;
  } catch (err) {
    document.getElementById("card").innerHTML = `<div class="error">載入失敗：${err.message}</div>`;
  }
}
load();
</script>
</body>
</html>
