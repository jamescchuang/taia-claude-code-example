<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-6 space-y-6">
    <header class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">向量資料庫管理與測試</h1>
        <p class="text-sm text-slate-500">FastAPI + Milvus Lite + Sentence-Transformers</p>
      </div>
      <div id="stats" class="text-sm text-slate-600 bg-white border border-slate-200 rounded-lg px-3 py-2">
        載入中…
      </div>
    </header>

    <section class="grid md:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
        <h2 class="text-lg font-semibold">參數設定</h2>
        <form id="configForm" class="space-y-3">
          <label class="block">
            <span class="text-sm text-slate-600">DB 檔案路徑</span>
            <input name="db_path" value="{{ config.db_path }}" class="mt-1 w-full border rounded-lg p-2 text-sm" />
          </label>
          <label class="block">
            <span class="text-sm text-slate-600">Collection 名稱</span>
            <input name="collection" value="{{ config.collection }}" class="mt-1 w-full border rounded-lg p-2 text-sm" />
          </label>
          <label class="block">
            <span class="text-sm text-slate-600">Embedding Model</span>
            <input name="embedding_model" value="{{ config.embedding_model }}" class="mt-1 w-full border rounded-lg p-2 text-sm" />
          </label>
          <div class="grid grid-cols-2 gap-3">
            <label class="block">
              <span class="text-sm text-slate-600">Chunk Size</span>
              <input type="number" min="50" name="chunk_size" value="{{ config.chunk_size }}" class="mt-1 w-full border rounded-lg p-2 text-sm" />
            </label>
            <label class="block">
              <span class="text-sm text-slate-600">Chunk Overlap</span>
              <input type="number" min="0" name="chunk_overlap" value="{{ config.chunk_overlap }}" class="mt-1 w-full border rounded-lg p-2 text-sm" />
            </label>
          </div>
          <button type="submit" class="w-full bg-slate-800 text-white rounded-lg py-2 text-sm hover:bg-slate-700">
            儲存參數
          </button>
        </form>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
        <h2 class="text-lg font-semibold">索引資料夾</h2>
        <p class="text-xs text-slate-500">
          支援副檔名：<span class="font-mono">{{ supported_exts|join(' ') }}</span>
        </p>
        <form id="indexForm" class="space-y-3">
          <label class="block">
            <span class="text-sm text-slate-600">資料夾路徑</span>
            <input name="folder" value="./data/docs" required class="mt-1 w-full border rounded-lg p-2 text-sm" />
          </label>
          <div class="flex gap-2">
            <button type="submit" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm hover:bg-indigo-500">
              開始索引
            </button>
            <button type="button" id="dropBtn" class="bg-rose-600 text-white rounded-lg py-2 px-3 text-sm hover:bg-rose-500">
              清空 Collection
            </button>
          </div>
        </form>
        <pre id="indexResult" class="bg-slate-900 text-slate-100 text-xs rounded-lg p-3 max-h-48 overflow-auto hidden"></pre>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
      <h2 class="text-lg font-semibold">查詢</h2>
      <form id="queryForm" class="flex flex-col md:flex-row gap-3">
        <input name="q" placeholder="輸入查詢字串…" required class="flex-1 border rounded-lg p-2 text-sm" />
        <input type="number" name="top_k" value="5" min="1" max="50" class="w-24 border rounded-lg p-2 text-sm" />
        <button type="submit" class="bg-emerald-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-emerald-500">
          查詢
        </button>
      </form>
      <div id="results" class="space-y-3"></div>
    </section>
  </div>

<script>
const toast = (msg, ok = true) => {
  const el = document.createElement('div');
  el.textContent = msg;
  el.className = `fixed bottom-4 right-4 text-sm text-white px-3 py-2 rounded-lg shadow ${ok ? 'bg-emerald-600' : 'bg-rose-600'}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
};

async function refreshStats() {
  try {
    const r = await fetch('/api/stats').then(r => r.json());
    document.getElementById('stats').textContent =
      `Collection: ${r.collection} · 狀態: ${r.exists ? '存在' : '尚未建立'} · 筆數: ${r.count ?? 0}`;
  } catch (e) {
    document.getElementById('stats').textContent = '無法讀取狀態';
  }
}

document.getElementById('configForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const r = await fetch('/api/config', { method: 'POST', body: fd }).then(r => r.json());
  toast(r.ok ? '已更新參數' : '更新失敗', r.ok);
  refreshStats();
});

document.getElementById('indexForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const btn = ev.target.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = '索引中…';
  try {
    const r = await fetch('/api/index', { method: 'POST', body: fd }).then(r => r.json());
    const box = document.getElementById('indexResult');
    box.classList.remove('hidden');
    box.textContent = JSON.stringify(r, null, 2);
    toast(r.ok ? `索引完成：${r.chunks ?? 0} chunks` : r.error || '索引失敗', r.ok);
  } finally {
    btn.disabled = false; btn.textContent = '開始索引';
    refreshStats();
  }
});

document.getElementById('dropBtn').addEventListener('click', async () => {
  if (!confirm('確定要清空 Collection？')) return;
  const r = await fetch('/api/drop', { method: 'POST' }).then(r => r.json());
  toast(r.ok ? '已清空' : '失敗', r.ok);
  refreshStats();
});

document.getElementById('queryForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const r = await fetch('/api/query', { method: 'POST', body: fd }).then(r => r.json());
  const box = document.getElementById('results');
  box.innerHTML = '';
  if (!r.results || r.results.length === 0) {
    box.innerHTML = '<p class="text-sm text-slate-500">沒有結果</p>';
    return;
  }
  r.results.forEach((hit, i) => {
    const card = document.createElement('div');
    card.className = 'border border-slate-200 rounded-lg p-3 bg-slate-50';
    card.innerHTML = `
      <div class="flex justify-between text-xs text-slate-500 mb-1">
        <span>#${i + 1} · ${hit.source}</span>
        <span>score: ${hit.score.toFixed(4)}</span>
      </div>
      <pre class="text-xs whitespace-pre-wrap text-slate-800">${hit.text.replace(/</g, '&lt;')}</pre>
    `;
    box.appendChild(card);
  });
});

refreshStats();
</script>
</body>
</html>
